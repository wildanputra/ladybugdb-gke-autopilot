apiVersion: v1
kind: Service
metadata:
  name: ladybugdb-mcp-server
  namespace: ladybugdb
  labels:
    app: ladybugdb-mcp-server
spec:
  selector:
    app: ladybugdb-mcp-server
  ports:
    - name: http-mcp
      port: 80
      targetPort: 8080
      protocol: TCP
  # ClusterIP: exposes the MCP server only inside the cluster.
  # MCP clients (AI agents, other services) connect to:
  #   http://ladybugdb-mcp-server.ladybugdb.svc.cluster.local/sse
  type: ClusterIP
