apiVersion: v1
kind: Service
metadata:
  name: ladybugdb-explorer
  namespace: ladybugdb
  labels:
    app: ladybugdb-explorer
spec:
  selector:
    app: ladybugdb-explorer
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  # ClusterIP: internal access only (recommended for production)
  # Change to LoadBalancer for direct external access (suitable for dev/testing)
  type: ClusterIP
---
