apiVersion: v1
kind: ServiceAccount
metadata:
  name: ladybugdb-sa
  namespace: ladybugdb
  annotations:
    # Workload Identity: binds this K8s SA to a GCP Service Account
    # Replace tridorian-sg-vertex-ai and GSA_NAME with your values before applying
    iam.gke.io/gcp-service-account: ladybugdb-gsa@tridorian-sg-vertex-ai.iam.gserviceaccount.com
