apiVersion: apps/v1
kind: Deployment
metadata:
  name: ladybugdb-mcp-server
  namespace: ladybugdb
  labels:
    app: ladybugdb-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ladybugdb-mcp-server
  template:
    metadata:
      labels:
        app: ladybugdb-mcp-server
      annotations:
        # Required to enable the Cloud Storage FUSE CSI sidecar injection
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "250m"
        gke-gcsfuse/memory-limit: "256Mi"
        gke-gcsfuse/ephemeral-storage-limit: "1Gi"
    spec:
      serviceAccountName: ladybugdb-sa
      containers:
        - name: mcp-server
          image: ghcr.io/ladybugdb/mcp-server-ladybug:latest
          imagePullPolicy: Always
          args:
            - "--db-path"
            - "/database/database.lbdb"
            - "--transport"
            - "sse"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8080"
          ports:
            - name: http-mcp
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            # Mount read-only: the MCP server is a consumer, not the writer.
            # The Explorer deployment owns writes via the same PVC.
            - name: gcs-database
              mountPath: /database
              readOnly: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
            limits:
              memory: "1Gi"
              ephemeral-storage: "1Gi"
          livenessProbe:
            httpGet:
              path: /sse
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /sse
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
      volumes:
        - name: gcs-database
          persistentVolumeClaim:
            claimName: ladybugdb-pvc
            readOnly: true
