apiVersion: apps/v1
kind: Deployment
metadata:
  name: ladybugdb-mcp-server
  namespace: ladybugdb
  labels:
    app: ladybugdb-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ladybugdb-mcp-server
  template:
    metadata:
      labels:
        app: ladybugdb-mcp-server
    spec:
      serviceAccountName: ladybugdb-sa
      containers:
        - name: mcp-server
          image: asia-southeast1-docker.pkg.dev/tridorian-sg-vertex-ai/ladybugdb/mcp-server-ladybug:latest
          imagePullPolicy: Always
          command: ["mcp-server-ladybug"]
          args:
            - "--db-path"
            - ":memory:"
            - "--transport"
            - "sse"
            - "--port"
            - "8080"
          env:
            - name: EXPLORER_URL
              value: "http://ladybugdb-explorer.ladybugdb.svc.cluster.local/api/cypher"
          ports:
            - name: http-mcp
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
            limits:
              memory: "1Gi"
              ephemeral-storage: "1Gi"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
